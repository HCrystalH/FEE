<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Home Page</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/styles.css">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/list.js" defer></script>
    <script src="../js/loadDashboard.js"></script>

    <script src="../js/utils/showNotification.js" defer></script>
    <script src= "../js/login.js" defer></script>
</head>

<body>
    <div class="container">
        <div id="dashboardContainer"></div>

        <div class="mt-4">
            <!-- Tabs -->
             <div class="btn-group mb-3" >
                <button class="btn btn-info btn-sm"> Active</button>
                <button class="btn btn-light btn-sm"> Drafts</button>
                <button class="btn btn-light btn-sm"> Closed</button>
             </div>
          
            <div id="notificationArea"></div>
            <!-- Table -->
            <table class ="table table-bordered table-sm">
                <thead class="thead-light">
                    <tr>
                        <th style="width: 60px">#</th>
                        <th> The list of questions and issues within</th>
                        <th style="width: 250px"> Management</th>
                    </tr>
                </thead>

                <tbody id="questionTableBody">
                 
                </tbody>
            </table>
        </div>
    </div>

    <div class="modal fade" id="deleteModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h2 class="modal-title">Delete Poll</h2>

                    <button type="button" class="close" data-dismiss="modal"> 
                        &times;
                    </button>
                </div>

                <div class="modal-body">
                    Are you sure you want to delete this poll?
                </div>

                <div class="modal-footer">
                    <button type="button"
                            class="btn btn-secondary"
                            data-dismiss="modal">
                        Cancel
                    </button>

                    <button type="button"
                            class="btn btn-danger"
                            id="confirmDelete">
                        Delete
                    </button>
                </div>

            </div>
        </div>
    </div>

    <div id="loginModalContainer"></div>
</body>
</html>
