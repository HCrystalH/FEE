<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Create Poll</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    
    <link rel="stylesheet" href="../css/styles.css">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>

    <script src="../js/loadDashboard.js"></script>
    <script src= "../js/login.js" defer></script>
    <script src="../js/utils/showNotification.js" defer></script>
    <script src="../js/create.js" defer></script>

    
</head>

<body>
    <!--  Nav bar -->
    <div class="container">
        <div id="dashboardContainer"></div>

        <div class ="container-body">
            <h1> Create Interview </h1>

            <div class="interviewForm">
                <form id="interview" >

                    <!-- Poll Name -->
                    <div class="formName">
                        <input
                        type="text"
                        placeholder="Name poll"
                        id="namePoll"
                        minlength="3"
                        maxlength="255"
                        required> 
                    </div>

                    <!-- Dynamic question blocks are appended by create.js -->
                    <div id ="questionBlocks"></div>
                    
                    <!-- Action buttons -->
                    <div class="form-actions">
                        <button class="add-question-btn" type="button"> + Add question</button>

                        <button class="retain-btn" type="submit"> Retain</button>
                    </div>
         
                </form>

            </div>         
        </div>
    </div>
   
    <div id="loginModalContainer"></div>
</body>
</html>
