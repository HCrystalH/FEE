<h1 class="page-title">Add Content</h1>
<div class="card">
    <div class="card-header">Content Form Elements</div>
    <div class="card-body">
        <form id="contentForm">

            <!-- title -->
            <div class="form-group">
                <label><strong>Title</strong></label>
                <input type="text" name="title" id="title" minlength="10" maxlength="200" class="form-control" placeholder="Enter the title" required>
            </div>

            <!-- Brief -->
            <div class="form-group">
                <label><strong>Brief</strong></label>
                <textarea name="brief" id="brief" class="form-control" minlength="30" maxlength="150" rows="3" placeholder="Enter a brief description" required></textarea>
            </div>

            <!-- Content -->
            <div class="form-group">
                <label><strong>Content</strong></label>
                <textarea name="content" id="content" class="form-control" maxlength="1000" rows="6" placeholder="Enter the content" required></textarea>
            </div>

            <!-- 2 buttons -->
            <button type="submit" class="btn btn-secondary">Submit Button</button>
            <button type="reset" class="btn btn-secondary">Reset Button</button>
        </form>
    </div>
</div>
