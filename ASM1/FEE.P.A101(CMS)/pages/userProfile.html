<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width">
    <title>CMS</title>

    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="../css/styles.css">
    
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">

        <a class="navbar-brand" href="#">CMS</a>

        <ul class="navbar-nav ml-auto">
            <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle" href="../pages/userProfile.html" data-toggle="dropdown">
                    <i class="fas fa-user"></i>
                </a>

                <div class="dropdown-menu dropdown-menu-right">
                    <a class="dropdown-item" href="../pages/userProfile.html">
                        <i class="fas fa-user"></i> User Profile
                    </a>

                    <a class="dropdown-item" href="../pages/login.html">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </a>
                </div>
            </li>
        </ul>

    </nav>

    <div class="container-fluid">
        <div class="row">

            <!-- Sidebar -->
            <div class="col-md-2 sidebar">

                <div class="input-group mb-3">
                    <input type="text" class="form-control" placeholder="Search...">

                    <div class="input-group-append">
                        <button class="btn btn-outline-secondary">
                            <i class="fas fa-search"></i>
                        </button>
                    </div>
                </div>

                <div class="list-group">
                    <a href="#" class="list-group-item list-group-item-action" data-page="viewContent">
                        <i class="fas fa-list"></i>
                        View contents
                    </a>

                    <a href="#" class="list-group-item list-group-item-action" data-page="formContent">
                        <i class="fas fa-edit"></i>
                        Form content
                    </a>
                </div>

            </div>

            <!-- Content -->
            <div class="col-md-10 content-wrapper" id="content-area">

                <h1 class="mb-4">Edit Profile</h1>

                <div class="card">

                    <div class="card-header"> Profile Form Elements </div>

                    <div class="card-body">

                        <form id="userProfileForm">

                            <div class="form-group">
                                <label>First Name</label>
                                <input type="text" name="firstName" id="firstName"
                                    minlength="3"
                                    maxlength="30"
                                    required
                                    class="form-control"
                                    placeholder="Enter the first name">
                            </div>

                            <div class="form-group">
                                <label>Last Name</label>
                                <input type="text" name="lastName" id="lastName"
                                    minlength="3"
                                    maxlength="30"
                                    class="form-control"
                                    required
                                    placeholder="Enter the last name">
                            </div>

                            <div class="form-group">
                                <label>Email</label>
                                <p class="form-control-plaintext">
                                    your_email@example.com
                                </p>
                            </div>

                            <div class="form-group">
                                <label>Phone</label>
                                <input type="text" name="phone" id="phone"
                                    required
                                    minlength="9"
                                    maxlength="13"
                                    class="form-control"
                                    placeholder="Enter your phone number">
                            </div>

                            <div class="form-group">
                                <label>Description</label>
                                <textarea class="form-control" name="description" id="description" rows="4" maxlength="200"></textarea>
                            </div>

                            <button type="submit" class="btn btn-secondary"> Submit Button </button>

                            <button type="reset" class="btn btn-secondary"> Reset Button </button>

                        </form>

                    </div>

                </div>

            </div>

        </div>
    </div>

    <script src="../js/userProfile.js"></script>

</body>
</html>
